name: Release Build & Publish

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v (e.g., v1.0.0)

jobs:
  release:
    name: Build & Release Assets
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Compile TypeScript
      run: npm run compile

    - name: Run Empirical Verification Tests (Zero-Bug Gate)
      run: node test_scratch.js

    - name: Create VS Code VSIX Package
      run: npx @vscode/vsce package --no-dependencies

    - name: Build Standalone Binaries (pkg)
      run: |
        mkdir -p dist
        npx pkg out/proxy_launcher.js --targets node18-win-x64 --output dist/tokencounter-proxy-win.exe
        npx pkg out/proxy_launcher.js --targets node18-linux-x64 --output dist/tokencounter-proxy-linux
        npx pkg out/proxy_launcher.js --targets node18-macos-x64 --output dist/tokencounter-proxy-macos

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/tokencounter-proxy-win.exe
          dist/tokencounter-proxy-linux
          dist/tokencounter-proxy-macos
          *.vsix
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
